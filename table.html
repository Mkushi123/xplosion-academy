<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
  </head>
  <body>
    <h1>My Table</h1>

    <table border="1">
      <tr>
        <th colspan="2">Full Name</th>
        <th>Age</th>
      </tr>
      <tr>
        <td>First Name</td>
        <td>Last Name</td>
        <td>25</td>
      </tr>
      <tr>
        <td>John</td>
        <td>Doe</td>
        <td>30</td>
      </tr>
    </table>
  </body>
</html>
